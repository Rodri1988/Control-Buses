<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema Control de Buses</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --green: #10b981; --text: #f8fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }
        .card { background: var(--card); padding: 30px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; margin-top: 20px; border: 1px solid #334155; }
        h1 { font-size: 1.8rem; margin-bottom: 8px; color: white; letter-spacing: -0.5px; }
        .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 25px; line-height: 1.4; }
        input { width: 100%; padding: 16px; margin: 10px 0; border-radius: 12px; border: 2px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 18px; text-align: center; transition: 0.3s; }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2); }
        .btn { width: 100%; padding: 18px; border-radius: 14px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-qr { background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-qr:active { transform: scale(0.96); opacity: 0.9; }
        .btn-admin { background: transparent; color: #475569; margin-top: 40px; font-size: 13px; text-decoration: underline; cursor: pointer; border: none; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; margin-top: 20px; display: none; border: 3px solid var(--accent); }
        .success-mark { display: none; color: var(--green); font-size: 75px; margin-top: 20px; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
        .status-text { margin-top: 20px; font-weight: 700; font-size: 18px; min-height: 24px; }
    </style>
</head>
<body>

    <div class="container" id="view-passenger">
        <div class="card">
            <div style="font-size: 60px; margin-bottom: 10px;">🚌</div>
            <h1>Sistema Control de Buses</h1>
            <p class="subtitle">Ingresa tu RUT sin puntos y con guion<br><b>Ej: 12345678-9</b></p>
            
            <input type="text" id="rut" placeholder="12345678-9" maxlength="12" spellcheck="false">
            
            <div id="reader"></div>
            
            <button class="btn btn-qr" id="btn-scan" onclick="procesarInicio()">
                📷 ESCANEAR QR BUS
            </button>

            <div class="success-mark" id="check">✔</div>
            <p id="msg" class="status-text"></p>
        </div>
        
        <button class="btn btn-admin" onclick="verAdmin()">Accesso Admin</button>
    </div>

    <div class="container" id="view-admin" style="display:none;">
        <div class="card">
            <div style="font-size: 40px; margin-bottom: 10px;">🔐</div>
            <h2>Panel de Control</h2>
            <input type="password" id="pass" placeholder="Contraseña Admin">
            <button class="btn btn-qr" onclick="login()">ENTRAR AL LISTADO</button>
            <button class="btn btn-admin" style="text-decoration:none;" onclick="location.reload()">← VOLVER</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw5h1bxjdxggEhmS2fbzU3Gkx2UNLDZtaxtsDZ9tX5MGgHC3pedLk3P5l80KL9qtgJgAA/exec"; 
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/1PUd7rDu4JxWmDTauXKIWUtL-bQaqnquOlsY6xNpTKng/edit";

        function verAdmin() {
            document.getElementById('view-passenger').style.display = 'none';
            document.getElementById('view-admin').style.display = 'block';
        }

        function login() {
            if(document.getElementById('pass').value === "mauricio2026") {
                window.location.href = SHEET_URL;
            } else { alert("Acceso denegado."); }
        }

        // VALIDACIÓN MATEMÁTICA DE RUT
        function m11(rut) {
            let s = 1, m = 0;
            for (; rut; rut = Math.floor(rut / 10))
                s = (s + rut % 10 * (9 - m++ % 6)) % 11;
            return s ? s - 1 : 'k';
        }

        function procesarInicio() {
            let rutRaw = document.getElementById('rut').value.trim().replace(/\./g, '');
            if (!rutRaw.includes('-')) {
                alert("⚠️ Error: El RUT debe incluir guion.");
                return;
            }
            const partes = rutRaw.split('-');
            if (m11(partes[0]).toString() !== partes[1].toLowerCase()) {
                alert("❌ RUT Inválido.");
                return;
            }
            abrirEscaner(rutRaw);
        }

        function abrirEscaner(rutFinal) {
            const readerDiv = document.getElementById('reader');
            const btnScan = document.getElementById('btn-scan');
            readerDiv.style.display = 'block';
            btnScan.style.display = 'none';

            const scanner = new Html5Qrcode("reader");
            // 25 FPS para lectura ultra-rápida (Prueba de estrés)
            scanner.start({ facingMode: "environment" }, { fps: 25, qrbox: 250 }, (busDetectado) => {
                
                // LÓGICA DE SEGUNDO PLANO (KEEP-ALIVE)
                // Enviamos los datos sin esperar respuesta para no retrasar la fila
                fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    keepalive: true,
                    body: JSON.stringify({ rut: rutFinal, bus: busDetectado })
                });

                // Feedback visual instantáneo al usuario
                scanner.stop();
                readerDiv.style.display = 'none';
                document.getElementById('check').style.display = 'block';
                const msg = document.getElementById('msg');
                msg.innerText = "✅ REGISTRADO: " + busDetectado.toUpperCase() + "\n¡SUBE AL BUS!";
                msg.style.color = "#10b981";

                // Reinicio rápido (1.5 seg) para el siguiente pasajero
                setTimeout(() => { location.reload(); }, 1500);
            }).catch(err => {
                alert("Error de cámara.");
                location.reload();
            });
        }
    </script>
</body>
</html>
