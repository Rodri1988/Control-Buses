<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control de Buses QR</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --bg: #0a0f1e; --accent: #3b82f6; --text: #e8edf8; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; text-align: center; }
        .screen { display: none; padding: 20px; flex-direction: column; min-height: 100vh; }
        .active { display: flex; }
        .btn { padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .btn-primary { background: var(--accent); color: white; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #151b2e; color: white; box-sizing: border-box; }
        #reader { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 10px; overflow: hidden; }
        .status-ok { color: #10b981; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

<div id="homeScreen" class="screen active">
    <h1>🚌 Control Buses</h1>
    <button class="btn btn-primary" onclick="showScreen('passengerScreen')">Soy Pasajero - Registrar</button>
    <button class="btn" style="background:#1e2840; color:white;" onclick="showScreen('loginScreen')">Admin</button>
</div>

<div id="passengerScreen" class="screen">
    <h2>Registro de Pasajero</h2>
    <input type="text" id="passengerRut" placeholder="Ingresa tu RUT (ej: 12345678-9)">
    <div id="reader" style="display:none;"></div>
    <button id="startScanBtn" class="btn btn-primary" onclick="startScanner()">Capturar QR del Bus</button>
    <div id="resultMsg" class="status-ok"></div>
    <button class="btn" onclick="location.reload()">Volver</button>
</div>

<div id="loginScreen" class="screen">
    <h2>Acceso Admin</h2>
    <input type="password" id="adminPass" placeholder="Contraseña">
    <button class="btn btn-primary" onclick="checkAdmin()">Entrar como Admin</button>
    <button class="btn" onclick="showScreen('homeScreen')">Cancelar</button>
</div>

<div id="adminPanel" class="screen">
    <h2>Panel de Buses</h2>
    <p>Selecciona un bus para ver el listado de hoy:</p>
    <div id="busButtons">
        <button class="btn btn-primary" onclick="viewBus('Bus 1')">Ver Bus 1</button>
        <button class="btn btn-primary" onclick="viewBus('Bus 2')">Ver Bus 2</button>
        <button class="btn btn-primary" onclick="viewBus('Bus 3')">Ver Bus 3</button>
        <button class="btn btn-primary" onclick="viewBus('Bus 4')">Ver Bus 4</button>
    </div>
    <div id="listado"></div>
    <button class="btn" onclick="location.reload()">Cerrar Sesión</button>
</div>

<script>
    let html5QrCode;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function startScanner() {
        const rut = document.getElementById('passengerRut').value;
        if (!rut) return alert("Por favor, ingresa tu RUT primero");

        document.getElementById('reader').style.display = 'block';
        document.getElementById('startScanBtn').style.display = 'none';

        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: 250 },
            (decodedText) => { // decodedText será el nombre del bus que tenga el QR
                sendData(rut, decodedText);
                html5QrCode.stop();
                document.getElementById('reader').style.display = 'none';
            }
        );
    }

    function sendData(rut, bus) {
        document.getElementById('resultMsg').innerHTML = "⌛ Registrando...";
        
        // AQUÍ CONECTAREMOS CON TU GOOGLE SHEETS
        const url = "TU_URL_DE_GOOGLE_APPS_SCRIPT"; 

        fetch(url, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ rut: rut, bus: bus, fecha: new Date().toLocaleString() })
        }).then(() => {
            document.getElementById('resultMsg').innerHTML = "✅ REGISTRADO / CHECK";
        });
    }

    function checkAdmin() {
        if (document.getElementById('adminPass').value === "admin123") {
            showScreen('adminPanel');
        } else {
            alert("Contraseña incorrecta");
        }
    }

    function viewBus(busName) {
        alert("Consultando registros de " + busName + " en Google Sheets...");
        // Aquí podrías abrir directamente tu Google Sheet para ver el listado
        window.open("URL_DE_TU_HOJA_DE_CALCULO_PARA_VER_LISTA", "_blank");
    }
</script>
</body>
</html>
